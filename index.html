<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPR POS — DEMO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* === TOKENS === */
:root {
  --coffee:  #3A1E1A;
  --bone:    #FFFDF9;
  --paper:   #F4F1EC;
  --linen:   #EBE5DC;
  --blush:   #F1C8CE;
  --petal:   #E4B0B7;
  --sage:    #7E938F;
  --sage-d:  #6F837F;
  --lime:    #BFD96A;
  --coral:   #FB6C5D;
  --carmin:  #B40D12;

  --font-label: 'Montserrat', sans-serif;
  --font-body:  'Inter', sans-serif;

  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;

  --shadow-sm: 0 1px 3px rgba(58,30,26,.08);
  --shadow-md: 0 4px 16px rgba(58,30,26,.12);
  --shadow-lg: 0 8px 32px rgba(58,30,26,.16);
}

/* === RESET === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font-body); background: var(--paper); color: var(--coffee); }
button { cursor: pointer; border: none; background: none; font-family: inherit; }
input  { font-family: inherit; }

/* === DEMO BANNER === */
#demo-banner {
  position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
  background: var(--coral); color: var(--bone);
  font-family: var(--font-label); font-size: 11px; font-weight: 700;
  letter-spacing: .12em; text-align: center; padding: 4px;
  text-transform: uppercase;
}
body { padding-top: 24px; }

/* === SCREEN SYSTEM === */
.screen { display: none; width: 100%; height: calc(100vh - 24px); overflow: hidden; }
.screen.active { display: flex; }

/* === LOGIN === */
#screen-login {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 40px;
  background: var(--paper);
}
.login-logo { height: 72px; object-fit: contain; }
.login-logo-placeholder {
  font-family: var(--font-label); font-size: 26px; font-weight: 800;
  color: var(--coffee); letter-spacing: .04em;
}
.login-subtitle {
  font-family: var(--font-label); font-size: 12px; font-weight: 600;
  letter-spacing: .15em; text-transform: uppercase; color: var(--sage);
  margin-top: -32px;
}
.login-cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
.cashier-card {
  background: var(--bone); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm); padding: 28px 24px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  cursor: pointer; transition: box-shadow .15s, transform .15s;
  min-width: 130px;
}
.cashier-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.cashier-avatar {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--petal); color: var(--coffee);
  font-family: var(--font-label); font-size: 18px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.cashier-name { font-family: var(--font-label); font-size: 14px; font-weight: 700; color: var(--coffee); }
.cashier-role { font-size: 11px; color: var(--sage); font-weight: 500; }

/* === ABRIR TURNO === */
#screen-turno {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  background: var(--paper);
}
.turno-card {
  background: var(--bone); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md); padding: 40px 48px;
  display: flex; flex-direction: column; align-items: center; gap: 24px;
  min-width: 360px;
}
.turno-title { font-family: var(--font-label); font-size: 20px; font-weight: 700; }
.turno-meta  { font-size: 13px; color: var(--sage); }
.turno-field { display: flex; flex-direction: column; gap: 6px; width: 100%; }
.turno-field label {
  font-family: var(--font-label); font-size: 11px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase; color: var(--sage);
}
.turno-field input {
  border: 1.5px solid var(--linen); border-radius: var(--radius-sm);
  padding: 12px 14px; font-size: 24px; font-weight: 600;
  color: var(--coffee); background: var(--paper);
  text-align: center; width: 100%; outline: none;
  transition: border-color .15s;
}
.turno-field input:focus { border-color: var(--sage); }
.btn-primary {
  width: 100%; padding: 14px; border-radius: var(--radius-md);
  background: var(--sage); color: var(--bone);
  font-family: var(--font-label); font-size: 15px; font-weight: 700;
  letter-spacing: .04em; transition: background .15s;
}
.btn-primary:hover { background: var(--sage-d); }
.btn-ghost {
  background: none; color: var(--sage); font-size: 13px; font-weight: 600;
  text-decoration: underline; padding: 4px;
}

/* === POS SHELL === */
#screen-pos {
  flex-direction: row;
  position: relative;
  background: var(--paper);
}

.sidebar {
  width: 56px; min-width: 56px;
  background: var(--sage);
  display: flex; flex-direction: column; align-items: center;
  padding: 16px 0; gap: 4px;
  position: relative; z-index: 100; flex-shrink: 0;
}
.sidebar-logo {
  width: 36px; height: 36px; object-fit: contain;
  margin-bottom: 12px; border-radius: 50%;
  background: var(--bone); padding: 4px;
}
.sidebar-logo-placeholder {
  width: 36px; height: 36px; background: var(--bone); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-label); font-size: 11px; font-weight: 800;
  color: var(--sage); margin-bottom: 12px;
}
.sidebar-icon-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm); font-size: 18px; cursor: pointer;
  position: relative; transition: background .12s;
  color: rgba(255,255,255,.7);
}
.sidebar-icon-btn:hover { background: rgba(255,255,255,.15); color: var(--bone); }
.sidebar-icon-btn.active { color: var(--bone); }
.sidebar-icon-btn.active::after {
  content: ''; position: absolute; right: -8px; top: 50%;
  transform: translateY(-50%);
  width: 3px; height: 24px; background: var(--blush); border-radius: 2px;
}

.sidebar-drawer {
  position: absolute; left: 56px; top: 0; bottom: 0; width: 224px;
  background: var(--bone); box-shadow: var(--shadow-lg);
  display: flex; flex-direction: column; padding: 20px 0;
  opacity: 0; pointer-events: none;
  transform: translateX(-8px);
  transition: opacity .18s, transform .18s;
  z-index: 200;
}
.sidebar-drawer.open { opacity: 1; pointer-events: auto; transform: translateX(0); }
.drawer-section-label {
  font-family: var(--font-label); font-size: 9px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--sage); padding: 12px 20px 4px;
}
.drawer-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px; cursor: pointer; transition: background .12s;
}
.drawer-item:hover { background: var(--paper); }
.drawer-item .di-icon { font-size: 17px; width: 22px; text-align: center; }
.drawer-item .di-label { font-family: var(--font-label); font-size: 13px; font-weight: 600; color: var(--coffee); }
.drawer-user {
  margin-top: auto; padding: 16px 20px;
  border-top: 1px solid var(--linen);
  display: flex; align-items: center; gap: 10px;
}
.drawer-user-av {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--petal); color: var(--coffee);
  font-family: var(--font-label); font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.drawer-user-name { font-family: var(--font-label); font-size: 13px; font-weight: 700; }
.drawer-user-role { font-size: 11px; color: var(--sage); }

.pos-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.pos-topbar {
  height: 56px; background: var(--bone);
  border-bottom: 1px solid var(--linen);
  display: flex; align-items: center; padding: 0 20px; gap: 16px; flex-shrink: 0;
}
.topbar-title { font-family: var(--font-label); font-size: 15px; font-weight: 700; white-space: nowrap; }
.topbar-search { flex: 1; max-width: 360px; margin: 0 auto; }
.topbar-search input {
  width: 100%; border: 1.5px solid var(--linen); border-radius: var(--radius-md);
  padding: 8px 14px; font-size: 14px; background: var(--paper);
  outline: none; transition: border-color .15s;
}
.topbar-search input:focus { border-color: var(--sage); }
.topbar-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }
.topbar-turno { font-size: 12px; color: var(--sage); white-space: nowrap; }
.btn-cerrar-turno {
  background: var(--linen); color: var(--coffee); border-radius: var(--radius-sm);
  padding: 7px 14px; font-family: var(--font-label); font-size: 12px; font-weight: 700;
  transition: background .12s;
}
.btn-cerrar-turno:hover { background: var(--petal); }
.pos-body { flex: 1; display: flex; overflow: hidden; min-height: 0; }

/* === CART === */
.cart-panel {
  width: 300px; min-width: 300px; background: var(--bone);
  border-right: 1px solid var(--linen);
  display: flex; flex-direction: column; overflow: hidden;
}
.cart-header {
  padding: 14px 16px; border-bottom: 1px solid var(--linen);
  font-family: var(--font-label); font-size: 13px; font-weight: 700;
}
.cart-lines { flex: 1; overflow-y: auto; padding: 8px 0; }
.cart-empty { padding: 24px; text-align: center; color: var(--sage); font-size: 13px; }
.cart-line {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; cursor: pointer; border-radius: var(--radius-sm);
  margin: 2px 6px; transition: background .12s; position: relative;
}
.cart-line:hover { background: var(--paper); }
.cart-line.selected { background: var(--blush); }
.cart-line.selected::before {
  content: ''; position: absolute; right: 0; top: 4px; bottom: 4px;
  width: 3px; background: var(--petal); border-radius: 2px;
}
.cart-qty-badge {
  background: var(--linen); color: var(--coffee);
  border-radius: 4px; padding: 2px 6px;
  font-family: var(--font-label); font-size: 11px; font-weight: 700;
  min-width: 28px; text-align: center; flex-shrink: 0;
}
.cart-line-info { flex: 1; min-width: 0; }
.cart-line-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cart-line-sub  { font-size: 11px; color: var(--sage); }
.cart-line-price { font-family: var(--font-label); font-size: 13px; font-weight: 700; white-space: nowrap; }
.cart-line-del {
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: var(--sage); transition: color .12s, background .12s;
}
.cart-line-del:hover { color: var(--carmin); background: rgba(180,13,18,.08); }
.cart-footer { border-top: 1px solid var(--linen); padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; }
.cart-totals { display: flex; flex-direction: column; gap: 4px; }
.cart-total-row { display: flex; justify-content: space-between; font-size: 13px; }
.cart-total-row.main { font-family: var(--font-label); font-size: 18px; font-weight: 800; margin-top: 4px; }
.btn-cobrar {
  padding: 14px; border-radius: var(--radius-md);
  background: var(--coral); color: var(--bone);
  font-family: var(--font-label); font-size: 16px; font-weight: 800;
  letter-spacing: .04em; transition: background .15s, opacity .15s;
}
.btn-cobrar:hover { background: #e8604f; }
.btn-cobrar:disabled { opacity: .45; cursor: not-allowed; }

/* === PRODUCTS === */
.products-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.category-bar {
  padding: 10px 16px; background: var(--bone);
  border-bottom: 1px solid var(--linen);
  display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none;
}
.category-bar::-webkit-scrollbar { display: none; }
.cat-pill {
  border-radius: 20px; padding: 5px 14px;
  font-family: var(--font-label); font-size: 12px; font-weight: 600;
  white-space: nowrap; cursor: pointer; flex-shrink: 0;
  background: var(--paper); color: var(--coffee);
  border: 1.5px solid var(--linen); transition: background .12s, color .12s, border-color .12s;
}
.cat-pill.active { background: var(--sage); color: var(--bone); border-color: var(--sage); }
.cat-pill:hover:not(.active) { border-color: var(--sage); }
.product-grid {
  flex: 1; overflow-y: auto;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px; padding: 16px; align-content: start;
}
.product-card {
  background: var(--bone); border-radius: var(--radius-md); box-shadow: var(--shadow-sm);
  display: flex; flex-direction: column; cursor: pointer; overflow: hidden;
  transition: box-shadow .15s, transform .15s;
}
.product-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.product-img {
  width: 100%; aspect-ratio: 1; background: var(--paper); overflow: hidden;
  display: flex; align-items: center; justify-content: center; position: relative;
}
.product-img img { width: 100%; height: 100%; object-fit: cover; }
.product-img-placeholder {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, var(--blush), var(--petal));
  display: flex; align-items: center; justify-content: center; font-size: 28px;
}
.product-plus-btn {
  position: absolute; bottom: 6px; right: 6px;
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--sage); color: var(--bone);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; line-height: 1;
  box-shadow: var(--shadow-sm); transition: background .12s;
}
.product-plus-btn:hover { background: var(--sage-d); }
.product-info { padding: 10px 10px 12px; display: flex; flex-direction: column; gap: 3px; }
.product-cat  { font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--sage); }
.product-name { font-family: var(--font-label); font-size: 13px; font-weight: 600; line-height: 1.3; }
.product-price { font-family: var(--font-label); font-size: 14px; font-weight: 800; color: var(--coffee); margin-top: 2px; }

/* === NUMPAD === */
.numpad { border-top: 1px solid var(--linen); padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
.numpad-modes { display: flex; gap: 4px; }
.numpad-mode-btn {
  flex: 1; padding: 6px 4px; border-radius: var(--radius-sm);
  font-family: var(--font-label); font-size: 11px; font-weight: 700;
  color: var(--coffee); background: var(--paper);
  border: 1.5px solid var(--linen); transition: background .12s, color .12s;
  text-align: center;
}
.numpad-mode-btn.active { background: var(--sage); color: var(--bone); border-color: var(--sage); }
.numpad-display {
  background: var(--paper); border-radius: var(--radius-sm);
  padding: 8px 12px; text-align: right;
  font-family: var(--font-label); font-size: 20px; font-weight: 700;
  color: var(--coffee); min-height: 40px; border: 1.5px solid var(--linen);
}
.numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.numpad-key {
  padding: 10px 4px; border-radius: var(--radius-sm);
  background: var(--paper); border: 1.5px solid var(--linen);
  font-family: var(--font-label); font-size: 16px; font-weight: 700;
  color: var(--coffee); text-align: center;
  transition: background .08s, transform .08s; user-select: none;
}
.numpad-key:hover  { background: var(--linen); }
.numpad-key:active { transform: scale(.94); }
.numpad-key.special { font-size: 12px; color: var(--sage); }

/* === COBRAR === */
#screen-cobrar {
  flex-direction: column; align-items: center; justify-content: center;
  background: var(--paper); overflow-y: auto;
}
.cobrar-wrap {
  background: var(--bone); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg); width: 560px; max-width: 95vw;
  display: flex; flex-direction: column; overflow: hidden;
}
.cobrar-header { background: var(--sage); color: var(--bone); padding: 24px 28px; }
.cobrar-label {
  font-family: var(--font-label); font-size: 11px; font-weight: 700;
  letter-spacing: .15em; text-transform: uppercase; opacity: .8;
}
.cobrar-total {
  font-family: var(--font-label); font-size: 40px; font-weight: 800; line-height: 1.1; margin-top: 4px;
}
.cobrar-body { padding: 24px 28px; display: flex; flex-direction: column; gap: 20px; }
.cobrar-section-label {
  font-family: var(--font-label); font-size: 11px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase; color: var(--sage);
}
.payment-methods { display: flex; flex-wrap: wrap; gap: 8px; }
.payment-method-btn {
  border: 2px solid var(--linen); border-radius: var(--radius-md);
  padding: 10px 16px; display: flex; align-items: center; gap: 8px;
  font-family: var(--font-label); font-size: 13px; font-weight: 600;
  color: var(--coffee); background: var(--paper); transition: border-color .12s, background .12s;
}
.payment-method-btn:hover   { border-color: var(--sage); background: var(--bone); }
.payment-method-btn.selected { border-color: var(--sage); background: var(--sage); color: var(--bone); }
.pm-icon { font-size: 18px; }
.payment-amount-row { display: flex; gap: 10px; align-items: center; }
.payment-amount-row label {
  font-family: var(--font-label); font-size: 12px; font-weight: 700;
  letter-spacing: .08em; color: var(--sage); white-space: nowrap;
}
.payment-amount-input {
  flex: 1; border: 1.5px solid var(--linen); border-radius: var(--radius-sm);
  padding: 10px 14px; font-size: 20px; font-weight: 700;
  color: var(--coffee); background: var(--paper); outline: none;
  transition: border-color .12s; text-align: right;
}
.payment-amount-input:focus { border-color: var(--sage); }
.btn-add-payment {
  border: 2px dashed var(--linen); border-radius: var(--radius-md);
  padding: 10px 16px; color: var(--sage);
  font-family: var(--font-label); font-size: 13px; font-weight: 600;
  transition: border-color .12s, color .12s;
}
.btn-add-payment:hover { border-color: var(--sage); color: var(--coffee); }
.payments-log { display: flex; flex-direction: column; gap: 6px; }
.payment-log-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--paper); border-radius: var(--radius-sm); padding: 8px 12px; font-size: 13px;
}
.payment-log-icon { font-size: 16px; }
.payment-log-label { flex: 1; font-weight: 500; }
.payment-log-amount { font-family: var(--font-label); font-weight: 700; }
.payment-log-del { color: var(--sage); font-size: 16px; cursor: pointer; transition: color .12s; }
.payment-log-del:hover { color: var(--carmin); }
.payment-balance {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0; border-top: 1px solid var(--linen);
}
.balance-label { font-family: var(--font-label); font-size: 13px; font-weight: 600; color: var(--sage); }
.balance-val   { font-family: var(--font-label); font-size: 22px; font-weight: 800; }
.balance-val.ok      { color: var(--sage); }
.balance-val.change  { color: #7A9A28; }
.balance-val.pending { color: var(--carmin); }
.cobrar-actions {
  display: flex; gap: 10px; padding: 20px 28px; border-top: 1px solid var(--linen);
}
.btn-cancel-cobrar {
  flex: 1; padding: 13px; border: 2px solid var(--linen); border-radius: var(--radius-md);
  font-family: var(--font-label); font-size: 14px; font-weight: 700;
  color: var(--coffee); transition: border-color .12s;
}
.btn-cancel-cobrar:hover { border-color: var(--petal); }
.btn-confirm-payment {
  flex: 2; padding: 13px; background: var(--coral); color: var(--bone);
  border-radius: var(--radius-md); font-family: var(--font-label);
  font-size: 15px; font-weight: 800; letter-spacing: .04em;
  transition: background .15s, opacity .15s;
}
.btn-confirm-payment:hover    { background: #e8604f; }
.btn-confirm-payment:disabled { opacity: .4; cursor: not-allowed; }

/* === RECIBO === */
#screen-recibo {
  flex-direction: column; align-items: center;
  background: var(--paper); overflow-y: auto;
  padding: 24px 0;
}
.recibo-wrap {
  background: var(--bone); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg); width: 420px; max-width: 95vw;
  padding: 32px 28px; display: flex; flex-direction: column; gap: 20px;
}
.recibo-header { text-align: center; display: flex; flex-direction: column; gap: 4px; align-items: center; }
.recibo-biz   { font-family: var(--font-label); font-size: 18px; font-weight: 800; }
.recibo-meta  { font-size: 11px; color: var(--sage); }
.recibo-sale-num {
  font-family: var(--font-label); font-size: 12px; font-weight: 700;
  color: var(--blush); background: var(--coffee);
  border-radius: 20px; padding: 3px 12px; margin-top: 4px;
}
.recibo-divider { border: none; border-top: 1px dashed var(--linen); }
.recibo-lines   { display: flex; flex-direction: column; gap: 8px; }
.recibo-line    { display: flex; justify-content: space-between; align-items: flex-start; font-size: 13px; gap: 8px; }
.recibo-line-name { flex: 1; }
.recibo-line-qty  { color: var(--sage); white-space: nowrap; font-size: 12px; }
.recibo-line-amt  { font-family: var(--font-label); font-weight: 700; white-space: nowrap; }
.recibo-totals    { display: flex; flex-direction: column; gap: 6px; }
.recibo-total-row { display: flex; justify-content: space-between; font-size: 13px; }
.recibo-total-row.main {
  font-family: var(--font-label); font-size: 22px; font-weight: 800;
  border-top: 2px solid var(--coffee); padding-top: 8px; margin-top: 4px;
}
.recibo-payments  { display: flex; flex-direction: column; gap: 4px; }
.recibo-pay-row   { display: flex; justify-content: space-between; font-size: 12px; color: var(--sage); }
.recibo-pay-row span:last-child { font-weight: 600; color: var(--coffee); }
.recibo-badge {
  border-radius: var(--radius-sm); padding: 8px 14px;
  font-family: var(--font-label); font-size: 13px; font-weight: 700; text-align: center;
}
.recibo-badge.ok     { background: var(--lime); color: var(--coffee); }
.recibo-badge.change { background: var(--lime); color: var(--coffee); }
.recibo-actions { display: flex; gap: 10px; }
.btn-print {
  flex: 1; padding: 12px; border: 2px solid var(--linen); border-radius: var(--radius-md);
  font-family: var(--font-label); font-size: 13px; font-weight: 700;
  color: var(--coffee); transition: border-color .12s;
}
.btn-print:hover { border-color: var(--sage); }
.btn-nueva-venta {
  flex: 2; padding: 12px; background: var(--sage); color: var(--bone);
  border-radius: var(--radius-md); font-family: var(--font-label);
  font-size: 14px; font-weight: 800; letter-spacing: .04em; transition: background .15s;
}
.btn-nueva-venta:hover { background: var(--sage-d); }

@media print {
  #demo-banner, .recibo-actions, .sidebar, .pos-topbar { display: none !important; }
  body { background: white; padding-top: 0; }
  #screen-recibo { background: white; padding: 0; }
  .recibo-wrap { box-shadow: none; border-radius: 0; width: 100%; max-width: 100%; }
}

/* === TRANSITIONS === */
.screen.active { animation: fadeIn .18s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>

<div id="demo-banner">DEMO — Sistema en desarrollo</div>

<div id="screen-login"    class="screen"></div>
<div id="screen-turno"    class="screen"></div>
<div id="screen-pos"      class="screen"></div>
<div id="screen-cobrar"   class="screen"></div>
<div id="screen-recibo"   class="screen"></div>

<script>
/* ============================================================
   STATE
   ============================================================ */
const STATE = {
  cashier:          null,
  turnoCash:        0,
  turnoStart:       null,
  cart:             [],
  selectedCartIdx:  -1,
  numMode:          'qty',
  numBuffer:        '',
  payments:         [],
  saleNumber:       1001,
  lastSale:         null,
};

/* ============================================================
   DATA
   ============================================================ */
const CASHIERS = [
  { name: 'Diana',  role: 'Cajera',    avatar: 'DI' },
  { name: 'Paola',  role: 'Cajera',    avatar: 'PA' },
  { name: 'Masha',  role: 'Gerente',   avatar: 'MA' },
  { name: 'Mario',  role: 'Admin',     avatar: 'MR' },
];

const PRODUCTS = [
  { id:  1, name: 'Moscú Classic',        category: 'Extensiones',  price: 120, img: 'assets/product_moscu.jpg' },
  { id:  2, name: 'San Petersburgo Pro',  category: 'Extensiones',  price: 150, img: 'assets/product_san_petersburgo.jpg' },
  { id:  3, name: 'Curler Premium',       category: 'Herramientas', price: 280, img: null },
  { id:  4, name: 'Adhesivo Express',     category: 'Adhesivos',    price:  95, img: null },
  { id:  5, name: 'Removedor Gel',        category: 'Adhesivos',    price:  65, img: null },
  { id:  6, name: 'Tweezers Pro',         category: 'Herramientas', price: 190, img: null },
  { id:  7, name: 'Volumen Ruso 0.07',    category: 'Extensiones',  price: 135, img: null },
  { id:  8, name: 'Clásicas 0.15',        category: 'Extensiones',  price: 110, img: null },
  { id:  9, name: 'Parche Hidrogel',      category: 'Accesorios',   price:  45, img: null },
  { id: 10, name: 'Base Protectora',      category: 'Cuidado',      price:  85, img: null },
  { id: 11, name: 'Cepillo Espiral',      category: 'Accesorios',   price:  35, img: null },
  { id: 12, name: 'Kit Starter',          category: 'Kits',         price: 420, img: null },
];

const CATEGORIES = ['Todos', ...new Set(PRODUCTS.map(p => p.category))];

const PAYMENT_METHODS = [
  { id: 'cash',  label: 'Efectivo',       icon: '💵' },
  { id: 'card',  label: 'Tarjeta',        icon: '💳' },
  { id: 'spei',  label: 'Transferencia',  icon: '🏦' },
  { id: 'mp',    label: 'Mercado Pago',   icon: '📱' },
  { id: 'clip',  label: 'Clip',           icon: '📲' },
];

/* ============================================================
   HELPERS
   ============================================================ */
function fmt(n) {
  return '$' + Number(n).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function cartTotal() {
  return STATE.cart.reduce((sum, line) => {
    const base = (line.priceOverride !== null ? line.priceOverride : line.product.price) * line.qty;
    return sum + base * (1 - line.discount / 100);
  }, 0);
}

function cartClear() {
  STATE.cart             = [];
  STATE.selectedCartIdx  = -1;
  STATE.numBuffer        = '';
  STATE.numMode          = 'qty';
}

function paymentTotal() {
  return STATE.payments.reduce((s, p) => s + p.amount, 0);
}

/* ============================================================
   SCREEN ROUTER
   ============================================================ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById('screen-' + id);
  if (target) {
    target.classList.add('active');
    if (target._onShow) target._onShow();
  }
}

/* ============================================================
   SCREEN BUILDERS — stubs (filled in Tasks 4-10)
   ============================================================ */
function buildLogin() {
  const el = document.getElementById('screen-login');

  const logoWrap = document.createElement('div');
  logoWrap.style.textAlign = 'center';

  const img = document.createElement('img');
  img.src = 'assets/logo_head_clean.png';
  img.alt = 'MPR';
  img.className = 'login-logo';
  img.onerror = function() {
    this.style.display = 'none';
    const txt = document.createElement('div');
    txt.className = 'login-logo-placeholder';
    txt.textContent = 'MPR';
    logoWrap.appendChild(txt);
  };
  logoWrap.appendChild(img);

  const sub = document.createElement('p');
  sub.className = 'login-subtitle';
  sub.textContent = 'Punto de Venta';
  logoWrap.appendChild(sub);

  const cards = document.createElement('div');
  cards.className = 'login-cards';

  CASHIERS.forEach(c => {
    const card = document.createElement('button');
    card.className = 'cashier-card';
    card.addEventListener('click', () => {
      STATE.cashier = c;
      showScreen('turno');
    });

    const av = document.createElement('div');
    av.className = 'cashier-avatar';
    av.textContent = c.avatar;

    const nm = document.createElement('div');
    nm.className = 'cashier-name';
    nm.textContent = c.name;

    const rl = document.createElement('div');
    rl.className = 'cashier-role';
    rl.textContent = c.role;

    card.append(av, nm, rl);
    cards.appendChild(card);
  });

  el.append(logoWrap, cards);
}
function buildTurno() {
  const el = document.getElementById('screen-turno');

  const card = document.createElement('div');
  card.className = 'turno-card';

  const title = document.createElement('h2');
  title.className = 'turno-title';
  title.textContent = 'Abrir turno';

  const meta = document.createElement('p');
  meta.className = 'turno-meta';

  const field = document.createElement('div');
  field.className = 'turno-field';

  const lbl = document.createElement('label');
  lbl.textContent = 'Efectivo inicial en caja';

  const inp = document.createElement('input');
  inp.type = 'number';
  inp.min = '0';
  inp.step = '0.01';
  inp.placeholder = '0.00';
  inp.id = 'turno-cash-input';

  field.append(lbl, inp);

  const btnAbrir = document.createElement('button');
  btnAbrir.className = 'btn-primary';
  btnAbrir.textContent = 'Abrir turno';
  btnAbrir.addEventListener('click', () => {
    STATE.turnoCash = parseFloat(inp.value) || 0;
    STATE.turnoStart = new Date();
    inp.value = '';
    showScreen('pos');
  });

  const btnBack = document.createElement('button');
  btnBack.className = 'btn-ghost';
  btnBack.textContent = '← Cambiar cajera';
  btnBack.addEventListener('click', () => showScreen('login'));

  card.append(title, meta, field, btnAbrir, btnBack);
  el.appendChild(card);

  el._onShow = () => {
    const now = new Date();
    const dateStr = now.toLocaleDateString('es-MX', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
    meta.textContent = (STATE.cashier ? STATE.cashier.name : '') + ' · ' + dateStr;
    inp.value = '';
    inp.focus();
  };
}
function buildNumpad(container) {
  const numpad = document.createElement('div');
  numpad.className = 'numpad';
  numpad.id = 'numpad';

  const modes = document.createElement('div');
  modes.className = 'numpad-modes';
  [['qty', 'Cant.'], ['disc', '% Desc'], ['price', 'Precio']].forEach(([mode, label]) => {
    const btn = document.createElement('button');
    btn.className = 'numpad-mode-btn' + (STATE.numMode === mode ? ' active' : '');
    btn.textContent = label;
    btn.dataset.mode = mode;
    btn.addEventListener('click', () => setNumMode(mode));
    modes.appendChild(btn);
  });

  const display = document.createElement('div');
  display.className = 'numpad-display';
  display.id = 'numpad-display';
  display.textContent = '—';

  const grid = document.createElement('div');
  grid.className = 'numpad-grid';
  ['7','8','9','4','5','6','1','2','3','+10','0','⌫'].forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'numpad-key' + (['⌫', '+10'].includes(k) ? ' special' : '');
    btn.textContent = k;
    btn.addEventListener('click', () => numPress(k));
    grid.appendChild(btn);
  });

  numpad.append(modes, display, grid);
  container.appendChild(numpad);
}

function setNumMode(mode) {
  STATE.numMode = mode;
  STATE.numBuffer = '';
  document.querySelectorAll('.numpad-mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  updateNumpad();
}

function numPress(key) {
  if (STATE.selectedCartIdx < 0 || STATE.cart.length === 0) return;

  if (key === '⌫') {
    STATE.numBuffer = STATE.numBuffer.slice(0, -1);
    applyNumpad();
    updateNumpad();
    renderCart();
    return;
  }

  if (key === '+10') {
    if (STATE.numMode !== 'qty') return;
    STATE.cart[STATE.selectedCartIdx].qty += 10;
    STATE.numBuffer = '';
    renderCart();
    updateNumpad();
    return;
  }

  if (key === '.' && STATE.numBuffer.includes('.')) return;
  STATE.numBuffer += key;
  applyNumpad();
  updateNumpad();
  renderCart();
}

function applyNumpad() {
  const line = STATE.cart[STATE.selectedCartIdx];
  if (!line) return;
  const val = parseFloat(STATE.numBuffer);
  if (isNaN(val) || STATE.numBuffer === '') return;

  if (STATE.numMode === 'qty') {
    line.qty = Math.max(1, Math.round(val));
  } else if (STATE.numMode === 'disc') {
    line.discount = Math.min(100, Math.max(0, val));
  } else if (STATE.numMode === 'price') {
    line.priceOverride = Math.max(0, val);
  }
}

function updateNumpad() {
  const disp = document.getElementById('numpad-display');
  if (!disp) return;

  if (STATE.selectedCartIdx < 0 || STATE.cart.length === 0) {
    disp.textContent = '—';
    return;
  }

  const line = STATE.cart[STATE.selectedCartIdx];
  if (STATE.numBuffer !== '') {
    disp.textContent = STATE.numBuffer + (STATE.numMode === 'disc' ? '%' : '');
    return;
  }

  if (STATE.numMode === 'qty') {
    disp.textContent = String(line.qty);
  } else if (STATE.numMode === 'disc') {
    disp.textContent = line.discount + '%';
  } else {
    const p = line.priceOverride !== null ? line.priceOverride : line.product.price;
    disp.textContent = fmt(p);
  }
}

let activeCategory = 'Todos';

function fillPosBody() {
  const body = document.getElementById('pos-body');
  if (!body) return;
  while (body.firstChild) body.removeChild(body.firstChild);

  /* Cart panel */
  const cartPanel = document.createElement('div');
  cartPanel.className = 'cart-panel';

  const cartHdr = document.createElement('div');
  cartHdr.className = 'cart-header';
  cartHdr.textContent = 'Carrito';

  const cartLines = document.createElement('div');
  cartLines.className = 'cart-lines';
  cartLines.id = 'cart-lines';

  const cartFooter = document.createElement('div');
  cartFooter.className = 'cart-footer';

  const totals = document.createElement('div');
  totals.className = 'cart-totals';

  const subtotalRow = document.createElement('div');
  subtotalRow.className = 'cart-total-row';
  const subtotalLbl = document.createElement('span');
  subtotalLbl.textContent = 'Subtotal';
  const subtotalVal = document.createElement('span');
  subtotalVal.id = 'cart-subtotal';
  subtotalVal.textContent = fmt(0);
  subtotalRow.append(subtotalLbl, subtotalVal);

  const totalRow = document.createElement('div');
  totalRow.className = 'cart-total-row main';
  const totalLbl = document.createElement('span');
  totalLbl.textContent = 'Total';
  const totalVal = document.createElement('span');
  totalVal.id = 'cart-total';
  totalVal.textContent = fmt(0);
  totalRow.append(totalLbl, totalVal);

  totals.append(subtotalRow, totalRow);

  const btnCobrar = document.createElement('button');
  btnCobrar.className = 'btn-cobrar';
  btnCobrar.textContent = 'Cobrar';
  btnCobrar.id = 'btn-cobrar';
  btnCobrar.disabled = true;
  btnCobrar.addEventListener('click', () => {
    STATE.payments = [];
    showScreen('cobrar');
  });

  cartFooter.append(totals, btnCobrar);
  cartPanel.append(cartHdr, cartLines);
  buildNumpad(cartPanel);
  cartPanel.append(cartFooter);

  /* Products panel */
  const prodPanel = document.createElement('div');
  prodPanel.className = 'products-panel';

  const catBar = document.createElement('div');
  catBar.className = 'category-bar';

  CATEGORIES.forEach(cat => {
    const pill = document.createElement('button');
    pill.className = 'cat-pill' + (cat === activeCategory ? ' active' : '');
    pill.textContent = cat;
    pill.addEventListener('click', () => {
      activeCategory = cat;
      document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      renderProducts();
    });
    catBar.appendChild(pill);
  });

  const grid = document.createElement('div');
  grid.className = 'product-grid';
  grid.id = 'product-grid';

  prodPanel.append(catBar, grid);
  body.append(cartPanel, prodPanel);

  renderProducts();
  renderCart();
}

function renderProducts() {
  const grid = document.getElementById('product-grid');
  if (!grid) return;
  while (grid.firstChild) grid.removeChild(grid.firstChild);

  const q = (document.getElementById('pos-search') ? document.getElementById('pos-search').value : '').toLowerCase();
  const filtered = PRODUCTS.filter(p => {
    const matchCat = activeCategory === 'Todos' || p.category === activeCategory;
    const matchQ   = !q || p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  filtered.forEach(p => {
    const card = document.createElement('div');
    card.className = 'product-card';
    card.addEventListener('click', () => addToCart(p));

    const imgWrap = document.createElement('div');
    imgWrap.className = 'product-img';

    if (p.img) {
      const img = document.createElement('img');
      img.src = p.img;
      img.alt = p.name;
      img.onerror = function() {
        this.style.display = 'none';
        const ph = document.createElement('div');
        ph.className = 'product-img-placeholder';
        ph.textContent = '🌸';
        imgWrap.appendChild(ph);
      };
      imgWrap.appendChild(img);
    } else {
      const ph = document.createElement('div');
      ph.className = 'product-img-placeholder';
      ph.textContent = '🌸';
      imgWrap.appendChild(ph);
    }

    const plusBtn = document.createElement('div');
    plusBtn.className = 'product-plus-btn';
    plusBtn.textContent = '+';
    imgWrap.appendChild(plusBtn);

    const info = document.createElement('div');
    info.className = 'product-info';
    const cat = document.createElement('div');
    cat.className = 'product-cat';
    cat.textContent = p.category;
    const nm = document.createElement('div');
    nm.className = 'product-name';
    nm.textContent = p.name;
    const pr = document.createElement('div');
    pr.className = 'product-price';
    pr.textContent = fmt(p.price);
    info.append(cat, nm, pr);

    card.append(imgWrap, info);
    grid.appendChild(card);
  });
}

function addToCart(product) {
  const existing = STATE.cart.find(l =>
    l.product.id === product.id && l.discount === 0 && l.priceOverride === null
  );
  if (existing) {
    existing.qty++;
    STATE.selectedCartIdx = STATE.cart.indexOf(existing);
  } else {
    STATE.cart.push({ product, qty: 1, discount: 0, priceOverride: null });
    STATE.selectedCartIdx = STATE.cart.length - 1;
  }
  STATE.numBuffer = '';
  renderCart();
}

function renderCart() {
  const linesEl = document.getElementById('cart-lines');
  if (!linesEl) return;
  while (linesEl.firstChild) linesEl.removeChild(linesEl.firstChild);

  if (STATE.cart.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'cart-empty';
    empty.textContent = 'Carrito vacío';
    linesEl.appendChild(empty);
  } else {
    STATE.cart.forEach((line, idx) => {
      const price     = line.priceOverride !== null ? line.priceOverride : line.product.price;
      const lineTotal = price * line.qty * (1 - line.discount / 100);

      const row = document.createElement('div');
      row.className = 'cart-line' + (idx === STATE.selectedCartIdx ? ' selected' : '');
      row.addEventListener('click', () => {
        STATE.selectedCartIdx = idx;
        STATE.numBuffer = '';
        renderCart();
        if (typeof updateNumpad === 'function') updateNumpad();
      });

      const badge = document.createElement('div');
      badge.className = 'cart-qty-badge';
      badge.textContent = line.qty;

      const info = document.createElement('div');
      info.className = 'cart-line-info';
      const nm = document.createElement('div');
      nm.className = 'cart-line-name';
      nm.textContent = line.product.name;
      const sub = document.createElement('div');
      sub.className = 'cart-line-sub';
      const parts = [];
      if (line.discount > 0) parts.push(line.discount + '% desc');
      if (line.priceOverride !== null) parts.push('precio libre');
      sub.textContent = parts.join(' · ') || (fmt(price) + ' c/u');
      info.append(nm, sub);

      const pr = document.createElement('div');
      pr.className = 'cart-line-price';
      pr.textContent = fmt(lineTotal);

      const del = document.createElement('button');
      del.className = 'cart-line-del';
      del.textContent = '×';
      del.addEventListener('click', e => {
        e.stopPropagation();
        STATE.cart.splice(idx, 1);
        if (STATE.selectedCartIdx >= STATE.cart.length) {
          STATE.selectedCartIdx = STATE.cart.length - 1;
        }
        STATE.numBuffer = '';
        renderCart();
        if (typeof updateNumpad === 'function') updateNumpad();
      });

      row.append(badge, info, pr, del);
      linesEl.appendChild(row);
    });
  }

  const total = cartTotal();
  const stEl = document.getElementById('cart-subtotal');
  const ttEl = document.getElementById('cart-total');
  if (stEl) stEl.textContent = fmt(total);
  if (ttEl) ttEl.textContent = fmt(total);

  const cobrarBtn = document.getElementById('btn-cobrar');
  if (cobrarBtn) cobrarBtn.disabled = STATE.cart.length === 0;
}

const NAV_ITEMS = [
  { icon: '🏪', label: 'POS',        section: 'Venta' },
  { icon: '📦', label: 'Inventario', section: 'Gestión' },
  { icon: '👥', label: 'Clientes',   section: 'Gestión' },
  { icon: '📊', label: 'Reportes',   section: 'Gestión' },
];

function buildPos() {
  const el = document.getElementById('screen-pos');

  /* --- Sidebar --- */
  const sidebar = document.createElement('div');
  sidebar.className = 'sidebar';

  const logoImg = document.createElement('img');
  logoImg.src = 'assets/logo_head_clean.png';
  logoImg.alt = 'MPR';
  logoImg.className = 'sidebar-logo';
  logoImg.onerror = function() {
    this.style.display = 'none';
    const ph = document.createElement('div');
    ph.className = 'sidebar-logo-placeholder';
    ph.textContent = 'MPR';
    sidebar.insertBefore(ph, sidebar.firstChild);
  };
  sidebar.appendChild(logoImg);

  NAV_ITEMS.forEach((item, i) => {
    const btn = document.createElement('div');
    btn.className = 'sidebar-icon-btn' + (i === 0 ? ' active' : '');
    btn.title = item.label;
    btn.textContent = item.icon;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sidebar-icon-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
    sidebar.appendChild(btn);
  });

  /* --- Drawer --- */
  const drawer = document.createElement('div');
  drawer.className = 'sidebar-drawer';

  let lastSection = '';
  NAV_ITEMS.forEach(item => {
    if (item.section !== lastSection) {
      const lbl = document.createElement('div');
      lbl.className = 'drawer-section-label';
      lbl.textContent = item.section;
      drawer.appendChild(lbl);
      lastSection = item.section;
    }
    const row = document.createElement('div');
    row.className = 'drawer-item';
    const ic = document.createElement('span');
    ic.className = 'di-icon';
    ic.textContent = item.icon;
    const lb = document.createElement('span');
    lb.className = 'di-label';
    lb.textContent = item.label;
    row.append(ic, lb);
    drawer.appendChild(row);
  });

  const userArea = document.createElement('div');
  userArea.className = 'drawer-user';
  userArea.id = 'drawer-user';
  drawer.appendChild(userArea);
  sidebar.appendChild(drawer);

  let hoverTimer;
  const openDrawer  = () => { clearTimeout(hoverTimer); drawer.classList.add('open'); };
  const closeDrawer = () => { hoverTimer = setTimeout(() => drawer.classList.remove('open'), 80); };
  sidebar.addEventListener('mouseenter', openDrawer);
  sidebar.addEventListener('mouseleave', closeDrawer);
  drawer.addEventListener('mouseenter', openDrawer);
  drawer.addEventListener('mouseleave', closeDrawer);

  /* --- Main area --- */
  const main = document.createElement('div');
  main.className = 'pos-main';

  const topbar = document.createElement('div');
  topbar.className = 'pos-topbar';

  const tTitle = document.createElement('div');
  tTitle.className = 'topbar-title';
  tTitle.textContent = 'Punto de Venta';

  const tSearch = document.createElement('div');
  tSearch.className = 'topbar-search';
  const tInput = document.createElement('input');
  tInput.type = 'search';
  tInput.placeholder = 'Buscar producto...';
  tInput.id = 'pos-search';
  tInput.addEventListener('input', renderProducts);
  tSearch.appendChild(tInput);

  const tRight = document.createElement('div');
  tRight.className = 'topbar-right';

  const tTurno = document.createElement('div');
  tTurno.className = 'topbar-turno';
  tTurno.id = 'topbar-turno-info';

  const btnCerrar = document.createElement('button');
  btnCerrar.className = 'btn-cerrar-turno';
  btnCerrar.textContent = 'Cerrar turno';
  btnCerrar.addEventListener('click', () => {
    if (confirm('¿Cerrar el turno y salir al login?')) {
      cartClear();
      STATE.payments = [];
      STATE.cashier = null;
      showScreen('login');
    }
  });

  tRight.append(tTurno, btnCerrar);
  topbar.append(tTitle, tSearch, tRight);

  const body = document.createElement('div');
  body.className = 'pos-body';
  body.id = 'pos-body';

  main.append(topbar, body);
  el.append(sidebar, main);

  el._onShow = () => {
    const searchInput = document.getElementById('pos-search');
    if (searchInput) searchInput.value = '';
    activeCategory = 'Todos';
    document.querySelectorAll('.cat-pill').forEach(p => {
      p.classList.toggle('active', p.textContent === 'Todos');
    });

    const av = document.getElementById('drawer-user');
    if (av && STATE.cashier) {
      while (av.firstChild) av.removeChild(av.firstChild);
      const avDiv = document.createElement('div');
      avDiv.className = 'drawer-user-av';
      avDiv.textContent = STATE.cashier.avatar;
      const info = document.createElement('div');
      const nm = document.createElement('div');
      nm.className = 'drawer-user-name';
      nm.textContent = STATE.cashier.name;
      const rl = document.createElement('div');
      rl.className = 'drawer-user-role';
      rl.textContent = STATE.cashier.role;
      info.append(nm, rl);
      av.append(avDiv, info);
    }
    const ti = document.getElementById('topbar-turno-info');
    if (ti && STATE.cashier) {
      ti.textContent = STATE.cashier.name + ' · ' + (STATE.turnoStart
        ? STATE.turnoStart.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' })
        : '');
    }
    if (typeof fillPosBody === 'function') fillPosBody();
  };
}
let selectedMethodId = null;

function buildPayment() {
  const el = document.getElementById('screen-cobrar');

  const wrap = document.createElement('div');
  wrap.className = 'cobrar-wrap';

  /* Header */
  const hdr = document.createElement('div');
  hdr.className = 'cobrar-header';
  const hdrLbl = document.createElement('div');
  hdrLbl.className = 'cobrar-label';
  hdrLbl.textContent = 'Total a cobrar';
  const hdrAmt = document.createElement('div');
  hdrAmt.className = 'cobrar-total';
  hdrAmt.id = 'cobrar-total-display';
  hdrAmt.textContent = fmt(0);
  hdr.append(hdrLbl, hdrAmt);

  /* Body */
  const body = document.createElement('div');
  body.className = 'cobrar-body';

  const methodsLabel = document.createElement('div');
  methodsLabel.className = 'cobrar-section-label';
  methodsLabel.textContent = 'Método de pago';

  const methodsWrap = document.createElement('div');
  methodsWrap.className = 'payment-methods';

  PAYMENT_METHODS.forEach(pm => {
    const btn = document.createElement('button');
    btn.className = 'payment-method-btn';
    btn.dataset.id = pm.id;
    const ic = document.createElement('span');
    ic.className = 'pm-icon';
    ic.textContent = pm.icon;
    const lb = document.createElement('span');
    lb.textContent = pm.label;
    btn.append(ic, lb);
    btn.addEventListener('click', () => selectPaymentMethod(pm.id));
    methodsWrap.appendChild(btn);
  });

  const amtRow = document.createElement('div');
  amtRow.className = 'payment-amount-row';
  const amtLbl = document.createElement('label');
  amtLbl.textContent = 'Monto:';
  const amtInp = document.createElement('input');
  amtInp.type = 'number';
  amtInp.min = '0';
  amtInp.step = '0.01';
  amtInp.className = 'payment-amount-input';
  amtInp.id = 'payment-amount-input';
  amtInp.placeholder = '0.00';
  amtRow.append(amtLbl, amtInp);

  const btnAddPay = document.createElement('button');
  btnAddPay.className = 'btn-add-payment';
  btnAddPay.textContent = '+ Agregar pago';
  btnAddPay.id = 'btn-add-payment';
  btnAddPay.addEventListener('click', addPayment);

  const logWrap = document.createElement('div');
  logWrap.className = 'payments-log';
  logWrap.id = 'payments-log';

  const balRow = document.createElement('div');
  balRow.className = 'payment-balance';
  const balLbl = document.createElement('div');
  balLbl.className = 'balance-label';
  balLbl.id = 'balance-label';
  balLbl.textContent = 'Pendiente';
  const balVal = document.createElement('div');
  balVal.className = 'balance-val pending';
  balVal.id = 'balance-val';
  balVal.textContent = fmt(0);
  balRow.append(balLbl, balVal);

  body.append(methodsLabel, methodsWrap, amtRow, btnAddPay, logWrap, balRow);

  /* Actions */
  const actions = document.createElement('div');
  actions.className = 'cobrar-actions';
  const btnCancel = document.createElement('button');
  btnCancel.className = 'btn-cancel-cobrar';
  btnCancel.textContent = 'Cancelar';
  btnCancel.addEventListener('click', () => showScreen('pos'));
  const btnConfirm = document.createElement('button');
  btnConfirm.className = 'btn-confirm-payment';
  btnConfirm.textContent = 'Confirmar pago';
  btnConfirm.id = 'btn-confirm-payment';
  btnConfirm.disabled = true;
  btnConfirm.addEventListener('click', confirmPayment);
  actions.append(btnCancel, btnConfirm);

  wrap.append(hdr, body, actions);
  el.appendChild(wrap);

  el._onShow = () => {
    selectedMethodId = null;
    document.querySelectorAll('.payment-method-btn').forEach(b => b.classList.remove('selected'));
    const tot = cartTotal();
    const td = document.getElementById('cobrar-total-display');
    if (td) td.textContent = fmt(tot);
    const ai = document.getElementById('payment-amount-input');
    if (ai) ai.value = tot.toFixed(2);
    refreshPaymentUI();
  };
}

function selectPaymentMethod(id) {
  selectedMethodId = id;
  document.querySelectorAll('.payment-method-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.id === id);
  });
  const tot      = cartTotal();
  const covered  = paymentTotal();
  const remaining = Math.max(0, tot - covered);
  const ai = document.getElementById('payment-amount-input');
  if (ai) {
    ai.value = remaining > 0 ? remaining.toFixed(2) : tot.toFixed(2);
    ai.focus();
  }
}

function addPayment() {
  if (!selectedMethodId) return;
  const ai = document.getElementById('payment-amount-input');
  const amount = parseFloat(ai ? ai.value : 0) || 0;
  if (amount <= 0) return;
  const pm = PAYMENT_METHODS.find(p => p.id === selectedMethodId);
  if (!pm) return;
  STATE.payments.push({ method: pm, amount });
  selectedMethodId = null;
  document.querySelectorAll('.payment-method-btn').forEach(b => b.classList.remove('selected'));
  if (ai) ai.value = '';
  refreshPaymentUI();
}

function removePayment(idx) {
  STATE.payments.splice(idx, 1);
  refreshPaymentUI();
}

function refreshPaymentUI() {
  const tot     = cartTotal();
  const covered = paymentTotal();
  const diff    = covered - tot;

  const log = document.getElementById('payments-log');
  if (log) {
    while (log.firstChild) log.removeChild(log.firstChild);
    STATE.payments.forEach((p, idx) => {
      const row = document.createElement('div');
      row.className = 'payment-log-row';
      const ic = document.createElement('span');
      ic.className = 'payment-log-icon';
      ic.textContent = p.method.icon;
      const lb = document.createElement('span');
      lb.className = 'payment-log-label';
      lb.textContent = p.method.label;
      const am = document.createElement('span');
      am.className = 'payment-log-amount';
      am.textContent = fmt(p.amount);
      const dl = document.createElement('button');
      dl.className = 'payment-log-del';
      dl.textContent = '×';
      dl.addEventListener('click', () => removePayment(idx));
      row.append(ic, lb, am, dl);
      log.appendChild(row);
    });
  }

  const balLbl = document.getElementById('balance-label');
  const balVal = document.getElementById('balance-val');
  if (balLbl && balVal) {
    balVal.className = 'balance-val';
    if (diff > 0.001) {
      balLbl.textContent = 'Cambio';
      balVal.textContent = fmt(diff);
      balVal.classList.add('change');
    } else if (covered >= tot - 0.001) {
      balLbl.textContent = 'Cubierto';
      balVal.textContent = fmt(tot);
      balVal.classList.add('ok');
    } else {
      balLbl.textContent = 'Pendiente';
      balVal.textContent = fmt(tot - covered);
      balVal.classList.add('pending');
    }
  }

  const btnConfirm = document.getElementById('btn-confirm-payment');
  if (btnConfirm) btnConfirm.disabled = covered < tot - 0.001;

  const btnAdd = document.getElementById('btn-add-payment');
  if (btnAdd) btnAdd.style.display = covered >= tot - 0.001 ? 'none' : '';
}

function confirmPayment() {
  STATE.lastSale = {
    number:   STATE.saleNumber++,
    cashier:  STATE.cashier,
    items:    STATE.cart.map(l => ({ ...l })),
    payments: STATE.payments.map(p => ({ ...p })),
    total:    cartTotal(),
    date:     new Date(),
  };
  showScreen('recibo');
}

function buildReceipt() {
  const el = document.getElementById('screen-recibo');

  const wrap = document.createElement('div');
  wrap.className = 'recibo-wrap';
  el.appendChild(wrap);

  el._onShow = () => {
    const sale = STATE.lastSale;
    if (!sale) return;

    while (wrap.firstChild) wrap.removeChild(wrap.firstChild);

    /* Header */
    const hdr = document.createElement('div');
    hdr.className = 'recibo-header';

    const bizName = document.createElement('div');
    bizName.className = 'recibo-biz';
    bizName.textContent = 'María Pestañas Rusas';

    const metaEl = document.createElement('div');
    metaEl.className = 'recibo-meta';
    metaEl.textContent = sale.date.toLocaleString('es-MX', {
      year: 'numeric', month: 'long', day: 'numeric',
      hour: '2-digit', minute: '2-digit',
    }) + ' · ' + sale.cashier.name;

    const saleNumEl = document.createElement('div');
    saleNumEl.className = 'recibo-sale-num';
    saleNumEl.textContent = '#' + sale.number;

    hdr.append(bizName, metaEl, saleNumEl);

    const div1 = document.createElement('hr');
    div1.className = 'recibo-divider';

    /* Lines */
    const linesWrap = document.createElement('div');
    linesWrap.className = 'recibo-lines';

    sale.items.forEach(line => {
      const price     = line.priceOverride !== null ? line.priceOverride : line.product.price;
      const lineTotal = price * line.qty * (1 - line.discount / 100);

      const row = document.createElement('div');
      row.className = 'recibo-line';

      const nm = document.createElement('div');
      nm.className = 'recibo-line-name';
      nm.textContent = line.product.name;

      const qty = document.createElement('div');
      qty.className = 'recibo-line-qty';
      let qtyText = line.qty + ' × ' + fmt(price);
      if (line.discount > 0) qtyText += ' (−' + line.discount + '%)';
      qty.textContent = qtyText;

      const amt = document.createElement('div');
      amt.className = 'recibo-line-amt';
      amt.textContent = fmt(lineTotal);

      row.append(nm, qty, amt);
      linesWrap.appendChild(row);
    });

    const div2 = document.createElement('hr');
    div2.className = 'recibo-divider';

    /* Totals */
    const totals = document.createElement('div');
    totals.className = 'recibo-totals';

    const subRow = document.createElement('div');
    subRow.className = 'recibo-total-row';
    const subLbl = document.createElement('span');
    subLbl.textContent = 'Subtotal';
    const subVal = document.createElement('span');
    subVal.textContent = fmt(sale.total);
    subRow.append(subLbl, subVal);

    const totRow = document.createElement('div');
    totRow.className = 'recibo-total-row main';
    const totLbl = document.createElement('span');
    totLbl.textContent = 'Total';
    const totVal = document.createElement('span');
    totVal.textContent = fmt(sale.total);
    totRow.append(totLbl, totVal);

    totals.append(subRow, totRow);

    /* Payments */
    const paysWrap = document.createElement('div');
    paysWrap.className = 'recibo-payments';

    sale.payments.forEach(p => {
      const row = document.createElement('div');
      row.className = 'recibo-pay-row';
      const lb = document.createElement('span');
      lb.textContent = p.method.icon + ' ' + p.method.label;
      const am = document.createElement('span');
      am.textContent = fmt(p.amount);
      row.append(lb, am);
      paysWrap.appendChild(row);
    });

    /* Badge */
    const covered = sale.payments.reduce((s, p) => s + p.amount, 0);
    const change  = covered - sale.total;
    const badge = document.createElement('div');
    badge.className = 'recibo-badge';
    if (change > 0.001) {
      badge.classList.add('change');
      badge.textContent = 'Cambio: ' + fmt(change);
    } else {
      badge.classList.add('ok');
      badge.textContent = '✓ Pagado';
    }

    /* Actions */
    const actions = document.createElement('div');
    actions.className = 'recibo-actions';

    const btnPrint = document.createElement('button');
    btnPrint.className = 'btn-print';
    btnPrint.textContent = '🖨 Imprimir';
    btnPrint.addEventListener('click', () => window.print());

    const btnNew = document.createElement('button');
    btnNew.className = 'btn-nueva-venta';
    btnNew.textContent = 'Nueva venta';
    btnNew.addEventListener('click', newSale);

    actions.append(btnPrint, btnNew);

    wrap.append(hdr, div1, linesWrap, div2, totals, paysWrap, badge, actions);
  };
}

function newSale() {
  cartClear();
  STATE.payments = [];
  showScreen('pos');
}

/* ============================================================
   BOOT
   ============================================================ */
document.addEventListener('DOMContentLoaded', () => {
  buildLogin();
  buildTurno();
  buildPos();
  buildPayment();
  buildReceipt();
  showScreen('login');
});
</script>
</body>
